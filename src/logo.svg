<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 52" fill="none">
  <style>
    .logo-text {
      font-family: "Didot", "GFS Didot", "Bodoni MT", "Playfair Display", Georgia, serif;
      font-size: 44px;
      font-weight: 400;
      letter-spacing: 0.05em;
      fill: white;
    }
    .logo-dot { fill: #E8501A; }
    .logo-line { stroke: #E8501A; stroke-width: 1.5; stroke-linecap: round; }
  </style>
  <text class="logo-text" x="4" y="44">KOVA</text>
  <!-- Orange underline under the O -->
  <line class="logo-line" x1="34" y1="49" x2="76" y2="49"/>
  <!-- Orange dot after A -->
  <circle class="logo-dot" cx="199" cy="43" r="5"/>
</svg>
